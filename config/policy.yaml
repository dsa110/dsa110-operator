# dsa110-operator capability policy  (the "what it can and can't do" doc, as code)
#
# This file is the single source of truth for what the agent may do. The
# human-readable capability doc (docs/CAPABILITIES.md) mirrors it; if they
# ever disagree, this file wins (it is what the code enforces). Editing this
# file is itself an approval-gated action (see actions.set_policy).
#
# Each control action has a `gate`:
#   autonomous  - the lease-holding session's agent may do it without a
#                 human OK (still audited + Slack-notified).
#   approval    - requires a typed confirmation by the local operator in
#                 the web console (recorded under their name), with a short TTL.
#   forbidden   - never, regardless of lease/approval (kept for rollout).
#
# `mode` (global): shadow renders the exact writes/calls each tool WOULD
# make and logs them WITHOUT sending; live actually executes. Phase 2
# ships in shadow; graduate per-action as each is validated.

version: 3
mode: shadow            # shadow | live   (Phase 0/2 default: shadow)

# Global kill switch. When paused, ALL mutating tools fail closed; reads
# and Q&A continue. The web console and a CLI can flip this.
paused: false

approval:
  ttl_seconds: 300      # an approval grant expires this long after issue
  two_person:           # actions needing a second authorized approver
    - set_policy

read_only:
  # The local operator may call these, no lease needed.
  - get_fleet_status
  - get_array_pointing
  - get_mon
  - get_audit_log
  - list_candidates
  - get_candidate
  - get_sefd
  - get_rfi_summary
  - get_sky_status
  - query_injections
  - get_observing_plan
  - get_observability
  - get_fstable_status
  - get_capture_health
  - get_buffer_health
  - get_warmup_status
  - get_rfi_detail
  - get_search_health
  - get_voltage_retention
  - get_c2_status
  - get_services_status
  - get_dumps_state
  - get_spectral_line_state
  - get_inject_calibrations
  - transit_report
  - health_report
  - describe_monitoring

# ---------------------------------------------------------------------------
# Control actions. `target` = your stated steady-state goal; `commissioning`
# = the conservative gate used until the action has been validated live.
# The active gate is min(commissioning, target) unless promoted in
# config/local.yaml. Promotion (commissioning -> target) is itself audited.
# ---------------------------------------------------------------------------
actions:
  fire_injection:        { target: autonomous, commissioning: autonomous,
                           reversible: true,
                           note: "Synthetic FRB into corr_fast; health-check + calibration." }
  inject_calibrate:      { target: autonomous, commissioning: autonomous,
                           reversible: true }
  utc_start:             { target: autonomous, commissioning: autonomous,
                           reversible: true, note: "Arm recording (ARM_SEQ)." }
  utc_stop:              { target: autonomous, commissioning: autonomous,
                           reversible: true }
  set_dumps_enabled:     { target: autonomous, commissioning: autonomous,
                           reversible: true }
  dump_now:              { target: autonomous, commissioning: autonomous,
                           reversible: true }
  point_array:           { target: autonomous, commissioning: autonomous,
                           reversible: true,
                           note: "Slew dishes in elevation. Antennas are intrinsically safe." }
  start_fleet:           { target: autonomous, commissioning: autonomous,
                           reversible: true }
  stop_fleet:            { target: autonomous, commissioning: autonomous,
                           reversible: true }
  bounce_search:         { target: autonomous, commissioning: autonomous,
                           reversible: true }
  restart_all:           { target: autonomous, commissioning: autonomous,
                           reversible: true,
                           note: "Cold fleet restart (async job) so a new dec/fstable is picked up." }
  build_fstable:         { target: autonomous, commissioning: autonomous,
                           reversible: true }
  deploy_fstable:        { target: autonomous, commissioning: autonomous,
                           reversible: true }
  set_spectral_line:     { target: autonomous, commissioning: autonomous,
                           reversible: false, note: "Takes effect next fleet start." }
  delete_snr_cal:        { target: autonomous, commissioning: autonomous,
                           reversible: false }
  # Always human-gated, per the operator's explicit instruction.
  update_fleet_code:     { target: approval,   commissioning: approval,
                           reversible: false,
                           note: "git pull/reset across the fleet. ALWAYS requires a human." }
  set_policy:            { target: approval,   commissioning: approval,
                           reversible: false, note: "Editing this policy. Two-person." }

# ---------------------------------------------------------------------------
# Autonomy (Phase 5). The standing local supervisor runs deterministic,
# non-LLM loops: health monitoring, optional auto-recovery, periodic
# injection health-checks, and ticking the observing-plan runner.
#
# Every loop is OFF by default. Monitoring (read-only health + alerting)
# runs whenever the supervisor is `enabled`; the three *mutating* loops
# (auto_recover / injection_health_check / run_plan) only act when their
# own flag is set AND the session holds the executor lease AND the
# dashboard hasn't locked agents out AND the e-stop isn't engaged. Every
# mutation still goes through the full ControlEngine gauntlet, so during
# commissioning a "recovery" or plan move surfaces as needs_approval
# rather than executing.
# ---------------------------------------------------------------------------
autonomy:
  enabled: true                # master switch for the supervisor loops
  auto_recover: true           # submit known-failure recoveries through the gate
  injection_health_check: true   # fire periodic injection probes + verify detection
  run_plan: true               # tick the observing-plan runner (armed plans only)
  intervals:
    health_s: 60               # health-monitor cadence
    injection_s: 3600          # periodic injection-probe cadence
    plan_s: 30                 # plan-runner tick cadence
  thresholds:
    fleet_min_corr: 16         # alert if fewer corr nodes report (16 corr nodes)
    fleet_min_search: 4        # alert if fewer search nodes report (4 search nodes)
    sky_frame_max_age_s: 300   # warn if the static-sky frame is staler than this
    sefd_max_age_s: 3600       # warn if the SEFD scan is staler than this
    rfi_flag_fraction_warn: 0.4   # warn if max per-node RFI flag fraction exceeds
    rfi_flag_fraction_alert: 0.7  # alert if max per-node RFI flag fraction exceeds
    sefd_max_jy: 5000          # warn if median SEFD exceeds this (Jy)
    injection_verify_after_s: 180  # wait this long before checking a probe landed

# Pointing safety envelope (correctness, not safety — antennas are safe by
# design). Commands outside this elevation range are refused by the tool
# layer to avoid sending invalid drive values.
pointing:
  lat_ovro_deg: 37.23
  el_min_deg: 30.0
  el_max_deg: 125.0
  settle_timeout_s: 120.0
  settle_tol_frac: 0.9
