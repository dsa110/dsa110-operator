<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DSA-110 Operator — Sign in</title>
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif;
           background: #0f1419; color: #dfe6e9; display: flex;
           min-height: 100vh; align-items: center; justify-content: center; margin: 0; }
    .card { background: #1a212b; border: 1px solid #2d3742; border-radius: 12px;
            padding: 40px 48px; text-align: center; max-width: 420px; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    p { color: #9aa7b2; font-size: 14px; }
    a.btn { display: inline-block; margin-top: 18px; padding: 10px 20px;
            background: #2f6df6; color: #fff; border-radius: 8px;
            text-decoration: none; font-weight: 600; }
    .err { color: #ff7675; margin-top: 14px; font-size: 13px; }
    .ro { color: #74b9ff; font-size: 12px; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>DSA-110 Operator</h1>
    <p>Monitoring &amp; control console</p>
    <a class="btn" href="/login">Sign in with Google</a>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <div class="ro">Read-only monitoring for all authorized users.
       Control is single-executor and audited.</div>
  </div>
</body>
</html>
